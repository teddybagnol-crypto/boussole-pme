databases:
  - name: boussole-db
    databaseName: boussole
    user: boussole
    plan: free

services:
  - type: web
    name: boussole-pme
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: boussole-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
